name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short -x \
            --ignore=tests/test_integration_testnet.py

      - name: Run full test suite (including skippable integration)
        run: |
          pytest tests/ -v --tb=short

      - name: Run integration harness (mock smoke, non-blocking)
        continue-on-error: true
        run: |
          cp .env.testnet.example .env.testnet
          ./scripts/run-integration-harness.sh \
            --mode mock \
            --env-file .env.testnet \
            --artifacts-dir artifacts/ci/mock

      - name: Upload integration harness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-harness-${{ matrix.python-version }}
          path: artifacts/ci/mock
          if-no-files-found: warn

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Lint with ruff
        run: ruff check hedera_shield/ tests/

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t hedera-shield:test .

      - name: Verify container starts
        run: |
          docker run -d --name hs-test -p 8000:8000 hedera-shield:test
          sleep 3
          curl -sf http://localhost:8000/health | grep -q healthy
          docker stop hs-test
